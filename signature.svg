<svg width="500" height="120" viewBox="0 0 500 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Caveat&amp;display=swap');

      .sig-text {
        font-family: 'Caveat', cursive;
        font-size: 60px;
        fill: none;
        stroke: #58a6ff;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 2000;
        stroke-dashoffset: 2000;
        animation: write 3.5s ease forwards;
      }

      @keyframes write {
        to {
          stroke-dashoffset: 0;
          fill: #58a6ff;
        }
      }
    </style>
  </defs>
  <text class="sig-text" x="20" y="85">Your Name</text>
</svg>