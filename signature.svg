<svg width="600" height="150" viewBox="0 0 600 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&amp;display=swap');

      .sig {
        font-family: 'Great Vibes', cursive;
        font-size: 90px;
        fill: none;
        stroke: #f97316;
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 3000;
        stroke-dashoffset: 3000;
        animation: swipeOut 6s ease-in-out infinite;
      }

      @keyframes swipeOut {
        0%   { stroke-dashoffset: 3000; fill: none;    opacity: 1; }
        45%  { stroke-dashoffset: 0;    fill: none;    opacity: 1; }
        70%  { stroke-dashoffset: 0;    fill: #f97316; opacity: 1; }
        88%  { stroke-dashoffset: 0;    fill: #f97316; opacity: 0; }
        100% { stroke-dashoffset: 3000; fill: none;    opacity: 0; }
      }
    </style>
  </defs>

  <text class="sig" x="20" y="115">Suyash Sahu</text>
</svg>
