<svg width="600" height="700" viewBox="0 0 600 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron&family=Great+Vibes&family=Permanent+Marker&family=Creepster&family=Dancing+Script&display=swap');

      text { fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

      .f1 { font-family: 'Orbitron', sans-serif;      font-size: 42px; stroke: #58a6ff; stroke-dasharray: 3000; animation: flood 5s ease-in-out infinite; }
      .f2 { font-family: 'Great Vibes', cursive;      font-size: 58px; stroke: #f97316; stroke-dasharray: 3000; animation: flood 5s ease-in-out infinite 0.3s; }
      .f3 { font-family: 'Permanent Marker', cursive; font-size: 48px; stroke: #39d353; stroke-dasharray: 3000; animation: flood 5s ease-in-out infinite 0.6s; }
      .f4 { font-family: 'Creepster', cursive;        font-size: 58px; stroke: #e879f9; stroke-dasharray: 3000; animation: flood 5s ease-in-out infinite 0.9s; }
      .f5 { font-family: 'Dancing Script', cursive;  font-size: 58px; stroke: #facc15; stroke-dasharray: 3000; animation: flood 5s ease-in-out infinite 1.2s; }

      @keyframes flood {
        0%   { stroke-dashoffset: 3000; fill: none;      opacity: 1; }
        50%  { stroke-dashoffset: 0;    fill: none;      opacity: 1; }
        75%  { stroke-dashoffset: 0;    fill: currentColor; opacity: 1; }
        90%  { stroke-dashoffset: 0;    fill: currentColor; opacity: 0; }
        100% { stroke-dashoffset: 3000; fill: none;      opacity: 0; }
      }

      .f1 { color: #58a6ff; }
      .f2 { color: #f97316; }
      .f3 { color: #39d353; }
      .f4 { color: #e879f9; }
      .f5 { color: #facc15; }
    </style>
  </defs>

  <!-- Labels -->
  <text x="20" y="30"  font-family="monospace" font-size="11" fill="#888" stroke="none">1. Orbitron (Techy)</text>
  <text x="20" y="170" font-family="monospace" font-size="11" fill="#888" stroke="none">2. Great Vibes (Elegant)</text>
  <text x="20" y="300" font-family="monospace" font-size="11" fill="#888" stroke="none">3. Permanent Marker (Raw)</text>
  <text x="20" y="430" font-family="monospace" font-size="11" fill="#888" stroke="none">4. Creepster (Spooky)</text>
  <text x="20" y="560" font-family="monospace" font-size="11" fill="#888" stroke="none">5. Dancing Script (Classic)</text>

  <!-- Signatures -->
  <text class="f1" x="20" y="100">Suyash Sahu</text>
  <text class="f2" x="20" y="240">Suyash Sahu</text>
  <text class="f3" x="20" y="370">Suyash Sahu</text>
  <text class="f4" x="20" y="500">Suyash Sahu</text>
  <text class="f5" x="20" y="640">Suyash Sahu</text>
</svg>
