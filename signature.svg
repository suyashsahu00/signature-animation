<svg width="600" height="150" viewBox="0 0 600 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&amp;display=swap');

      .sig {
        font-family: 'Great Vibes', cursive;
        font-size: 90px;
        fill: none;
        stroke: #e8820c;
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 3000;
        stroke-dashoffset: 3000;
        animation: swipeOut 8s linear infinite;
      }

      @keyframes swipeOut {
        0%   { stroke-dashoffset: 3000; fill: transparent;          opacity: 1; }
        30%  { stroke-dashoffset: 0;    fill: transparent;          opacity: 1; }
        38%  { stroke-dashoffset: 0;    fill: rgba(232,130,12,0.1); opacity: 1; }
        48%  { stroke-dashoffset: 0;    fill: rgba(232,130,12,0.4); opacity: 1; }
        58%  { stroke-dashoffset: 0;    fill: rgba(232,130,12,0.7); opacity: 1; }
        68%  { stroke-dashoffset: 0;    fill: rgba(232,130,12,1.0); opacity: 1; }
        82%  { stroke-dashoffset: 0;    fill: rgba(232,130,12,1.0); opacity: 0; }
        100% { stroke-dashoffset: 3000; fill: transparent;          opacity: 0; }
      }
    </style>
  </defs>

  <text class="sig" x="20" y="115">Suyash Sahu</text>
</svg>
